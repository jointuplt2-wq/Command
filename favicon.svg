<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b93ff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f6ef7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- 배경 둥근 사각형 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- 내부 어두운 터미널 창 -->
  <rect x="8" y="10" width="48" height="38" rx="6" fill="#0d0d1a" opacity="0.75"/>

  <!-- 터미널 상단 도트 3개 -->
  <circle cx="16" cy="18" r="2.2" fill="#ff6b6b" opacity="0.9"/>
  <circle cx="23" cy="18" r="2.2" fill="#ffd93d" opacity="0.9"/>
  <circle cx="30" cy="18" r="2.2" fill="#6bcb77" opacity="0.9"/>

  <!-- 프롬프트 > 기호 -->
  <polyline points="13,29 19,33 13,37" fill="none" stroke="#7b93ff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 커서 바 -->
  <rect x="22" y="30" width="14" height="2.8" rx="1.4" fill="#c084fc" opacity="0.9"/>

  <!-- 하단 작은 라인들 (코드 느낌) -->
  <rect x="13" y="42" width="18" height="2" rx="1" fill="#7b93ff" opacity="0.5"/>
  <rect x="33" y="42" width="10" height="2" rx="1" fill="#c084fc" opacity="0.4"/>

  <!-- 하단 키보드 아이콘 느낌 -->
  <rect x="18" y="54" width="28" height="5" rx="2.5" fill="#ffffff" opacity="0.15"/>
  <rect x="22" y="55.5" width="20" height="2" rx="1" fill="#ffffff" opacity="0.25"/>
</svg>
