<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Command Glossary — 용어 & 명령어 모음집</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.svg" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CMD Glossary" />
  <meta name="theme-color" content="#7b93ff" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css?v=2" />
  <link rel="stylesheet" href="css/tokens.css?v=2" />
  <link rel="stylesheet" href="css/theme.css?v=2" />
  <link rel="stylesheet" href="css/layout.css?v=2" />
  <link rel="stylesheet" href="css/components.css?v=2" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header__inner">
      <div class="header__brand">
        <span class="header__icon">⌨️</span>
        <h1 class="header__title">Command Glossary</h1>
      </div>
      <nav class="header__actions">
        <button class="btn btn--ghost btn--sm" id="btn-import" aria-label="가져오기">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          가져오기
        </button>
        <button class="btn btn--ghost btn--sm" id="btn-export" aria-label="내보내기">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          내보내기
        </button>
        <button class="theme-toggle" id="btn-theme" aria-label="테마 전환">
          <span class="theme-toggle__icon theme-toggle__icon--light">☀️</span>
          <span class="theme-toggle__icon theme-toggle__icon--dark">🌙</span>
        </button>
      </nav>
    </div>
  </header>

  <!-- ===== SEARCH BAR ===== -->
  <section class="search-section">
    <div class="container">
      <div class="search-bar">
        <div class="search-bar__input-wrap">
          <svg class="search-bar__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input
            type="search"
            id="search-input"
            class="search-bar__input"
            placeholder="용어명, 설명, 태그로 검색..."
            autocomplete="off"
            aria-label="검색"
          />
        </div>
        <select id="category-filter" class="search-bar__select" aria-label="카테고리 필터">
          <option value="">전체 카테고리</option>
        </select>
      </div>
      <div class="search-info" id="search-info"></div>
    </div>
  </section>

  <!-- ===== CARD GRID ===== -->
  <main class="main">
    <div class="container">
      <div class="card-grid" id="card-grid" role="list"></div>
      <div class="empty-state" id="empty-state" hidden>
        <div class="empty-state__icon">🔍</div>
        <p class="empty-state__title">결과가 없어요</p>
        <p class="empty-state__desc">다른 키워드로 검색하거나 새 항목을 추가해보세요.</p>
      </div>
    </div>
  </main>

  <!-- ===== FAB ===== -->
  <button class="fab" id="btn-add" aria-label="새 항목 추가">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <!-- ===== SCROLL TO TOP ===== -->
  <button class="scroll-top" id="btn-scroll-top" aria-label="맨 위로" hidden>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <!-- ===== FORM MODAL ===== -->
  <div class="modal-backdrop" id="form-backdrop" hidden aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="form-modal-title">
      <div class="modal__header">
        <h2 class="modal__title" id="form-modal-title">새 항목 추가</h2>
        <button class="modal__close" id="form-close" aria-label="닫기">✕</button>
      </div>
      <form class="modal__body" id="item-form" novalidate>
        <input type="hidden" id="form-id" />
        <div class="form-group">
          <label class="form-label" for="form-name">용어명 <span class="required">*</span></label>
          <input type="text" id="form-name" class="form-input" placeholder="예: git rebase" required />
          <span class="form-error" id="error-name"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="form-category">카테고리</label>
          <div class="category-row">
            <select id="form-category" class="form-input">
              <option value="">선택 없음</option>
            </select>
            <button type="button" class="btn btn--ghost btn--sm" id="btn-add-category">+ 추가</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="form-desc">설명</label>
          <textarea id="form-desc" class="form-input form-textarea" placeholder="용어 설명을 입력하세요..." rows="4"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="form-tags">태그 <span class="form-hint">(쉼표로 구분)</span></label>
          <input type="text" id="form-tags" class="form-input" placeholder="예: git, branch, history" />
        </div>
        <div class="modal__footer">
          <button type="button" class="btn btn--ghost" id="form-cancel">취소</button>
          <button type="submit" class="btn btn--primary" id="form-submit">저장</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== DETAIL MODAL ===== -->
  <div class="modal-backdrop" id="detail-backdrop" hidden aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="detail-modal-title">
      <div class="modal__header">
        <div>
          <span class="badge" id="detail-category"></span>
          <h2 class="modal__title" id="detail-modal-title"></h2>
        </div>
        <button class="modal__close" id="detail-close" aria-label="닫기">✕</button>
      </div>
      <div class="modal__body">
        <p class="detail-desc" id="detail-desc"></p>
        <div class="tag-list" id="detail-tags"></div>
        <p class="detail-meta" id="detail-meta"></p>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" id="detail-edit">수정</button>
        <button class="btn btn--danger" id="detail-delete">삭제</button>
      </div>
    </div>
  </div>

  <!-- ===== DELETE CONFIRM MODAL ===== -->
  <div class="modal-backdrop" id="confirm-backdrop" hidden aria-hidden="true">
    <div class="modal modal--sm" role="dialog" aria-modal="true">
      <div class="modal__header">
        <h2 class="modal__title">삭제 확인</h2>
      </div>
      <div class="modal__body">
        <p id="confirm-message">이 항목을 삭제할까요? 되돌릴 수 없습니다.</p>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" id="confirm-cancel">취소</button>
        <button class="btn btn--danger" id="confirm-ok">삭제</button>
      </div>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <!-- ===== HIDDEN FILE INPUT ===== -->
  <input type="file" id="import-file" accept=".json" hidden />

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
  <script src="js/storage.js?v=2"></script>
  <script src="js/theme.js?v=2"></script>
  <script src="js/render.js?v=2"></script>
  <script src="js/search.js?v=2"></script>
  <script src="js/backup.js?v=2"></script>
  <script src="js/main.js?v=2"></script>
</body>
</html>
